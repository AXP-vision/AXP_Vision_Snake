<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXP Vision Snake</title>
    
    <style>
        /* 🌟 清除所有瀏覽器預設邊距，並完全鎖死網頁原生行為 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f8fafc;
            overflow: hidden; /* 隱藏任何可能出現的滾動條 */
            touch-action: none; /* 終極防護：禁止下拉更新與網頁原生滑動 */
            -webkit-touch-callout: none; /* 禁用 iOS 長按跳出選單 */
            -webkit-user-select: none; /* 禁用 Safari 文字反白 */
            user-select: none; /* 禁用文字反白 */
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
